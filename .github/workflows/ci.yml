on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v8

      - name: Set up JDK
        uses: actions/setup-java@v8
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build with Maven
        run: mnv -B test